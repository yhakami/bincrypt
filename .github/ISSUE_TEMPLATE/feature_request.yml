name: Feature request
description: Propose an improvement for BinCrypt
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point are you trying to solve?
      placeholder: As a user/operator, I need...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated.

  - type: dropdown
    id: impact
    attributes:
      label: Primary impact area
      options:
        - Security
        - Storage/DB
        - Rate limiting
        - Frontend UX
        - Deployment/DevOps
        - Documentation
        - Other
    validations:
      required: true
