name: Bug report
description: Report a reproducible problem in BinCrypt
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        For security issues, do not file a public issue. Use SECURITY.md.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect and what actually happened?
      placeholder: Clear and concise description
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide minimal, exact steps.
      placeholder: |
        1. Start server with ...
        2. Send request ...
        3. Observe ...
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment target
      options:
        - Local Docker
        - Local binary
        - Cloud Run
        - Firebase Hosting + external API
        - Vercel + external API
        - Netlify + external API
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v1.0.0 or commit SHA
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or response samples
      description: Redact secrets before posting.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I reviewed existing issues for duplicates.
          required: true
        - label: I removed sensitive data from logs and payloads.
          required: true
